<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dungeon Diver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        background: #000;
        outline: none;
        border: 0;
      }

      html:focus,
      body:focus,
      #canvas:focus {
        outline: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="-1"></canvas>
    <script>
      window.Module = {
        canvas: document.getElementById('canvas'),
      };
    </script>
    <script src="./raylib-framework-testing.js"></script>
  </body>
</html>
